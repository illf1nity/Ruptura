<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruptura — Your Economic Reality</title>
  <meta name="description" content="See how you've been affected. Anonymous. No tracking.">
  <meta http-equiv="refresh" content="0;url=econ.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ruptura-tokens.css">
  <style>
    body {
      background: var(--bg-primary, #0C0F14);
      color: var(--text-primary, #F0EDE8);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    a {
      color: var(--accent-gold, #D4A054);
    }

    /* ========== CSS VARIABLES ========== */
    :root {
      --void-black: #0a0a0a;
      --terminal-green: #33ff33;
      --terminal-red: #ff3333;
      --dim-white: rgba(255, 255, 255, 0.1);
      --timing-fast: 0.2s;
      --timing-standard: 0.3s;
      --timing-slow: 0.5s;
      --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
      --ease-elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ========== KINETIC FEATURES ANIMATIONS ========== */

    /* Profit Stopwatch - Jolt */
    @keyframes jolt {
      0% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      50% { transform: translateX(3px); }
      75% { transform: translateX(-2px); }
      100% { transform: translateX(0); }
    }

    /* Corporate Infection - Pulse */
    @keyframes pulse {
      0%, 100% { transform: scale(1.25); }
      50% { transform: scale(1.3); }
    }

    /* Corporate Infection - Infect */
    @keyframes infect {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      50% {
        transform: scale(1.4);
      }
      100% {
        transform: scale(1.25);
        opacity: 1;
      }
    }

    /* Inflation Vise - Crush Left */
    @keyframes crush-left {
      0% { left: 0; }
      100% { left: calc(50% - 100px - 40px); }
    }

    /* Inflation Vise - Crush Right */
    @keyframes crush-right {
      0% { right: 0; }
      100% { right: calc(50% - 100px - 40px); }
    }

    /* Inflation Vise - Vibrate */
    @keyframes vibrate {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-2px, 1px); }
      20% { transform: translate(2px, -1px); }
      30% { transform: translate(-1px, 2px); }
      40% { transform: translate(1px, -2px); }
      50% { transform: translate(-2px, -1px); }
      60% { transform: translate(2px, 1px); }
      70% { transform: translate(-1px, -2px); }
      80% { transform: translate(1px, 2px); }
      90% { transform: translate(-2px, 1px); }
    }

    /* Inflation Vise - Stamp */
    @keyframes stamp {
      0% {
        transform: scale(2);
        opacity: 0;
      }
      50% {
        transform: scale(0.9);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Calendar - Press In */
    @keyframes press-in {
      0% {
        box-shadow: 0 0 0 rgba(0, 0, 0, 0);
        transform: scale(1);
      }
      50% {
        transform: scale(0.95);
      }
      100% {
        box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.4);
        transform: scale(1);
      }
    }

    /* Calendar - Rise */
    @keyframes rise {
      0% {
        transform: scale(1) translateY(10px);
        opacity: 0;
      }
      70% {
        transform: scale(1.25);
      }
      100% {
        transform: scale(1.2) translateY(0);
        opacity: 1;
      }
    }

    /* Calendar - Glow */
    @keyframes glow {
      0%, 100% {
        box-shadow:
          0 8px 16px rgba(51, 255, 51, 0.4),
          0 0 20px rgba(51, 255, 51, 0.3);
      }
      50% {
        box-shadow:
          0 8px 16px rgba(51, 255, 51, 0.6),
          0 0 30px rgba(51, 255, 51, 0.5);
      }
    }

    /* One Bad Day - Snap */
    @keyframes snap {
      0% {
        transform: scaleX(1.05);
        filter: brightness(1.5);
      }
      100% {
        transform: scaleX(1);
        filter: brightness(1);
      }
    }

    /* One Bad Day - Heartbeat */
    @keyframes heartbeat {
      0%, 100% {
        transform: scale(1);
        filter: brightness(1);
      }
      50% {
        transform: scale(1.15);
        filter: brightness(1.3);
      }
    }

    /* ========== ACCESSIBILITY ========== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <p>Redirecting to <a href="econ.html">Ruptura</a>...</p>
  <script>window.location.replace('econ.html');</script>
</body>
</html>
